<!DOCTYPE html>
<html>
  <head></head>
  <body>
    <nav class="navbar navbar-expand-sm bg-light navbar-light">
      <a class="navbar-brand" href="/">Wesley Maa</a>

      <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#collapsibleNavbar">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="collapsibleNavbar">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" id="aboutme-link" href="/aboutme" style="touch-action:manipulation">About Me</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/projects">Project Portfolio</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/resume">Experience</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/reading">Reading List</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/thoughts">Thoughts</a>
          </li>
        </ul>
      </div>
    </nav>

    <script>
      (function() {
        var aboutLink = document.getElementById("aboutme-link");
        var clickCount = 0;
        var navTimer = null;
        var TARGET_CLICKS = 10;
        var CLICK_WINDOW_MS = 500;

        aboutLink.addEventListener("click", function(e) {
          e.preventDefault();
          clickCount++;
          clearTimeout(navTimer);

          if (clickCount >= TARGET_CLICKS) {
            window.location = "/traces";
            return;
          }

          // If no further click arrives quickly, treat it as a normal visit
          navTimer = setTimeout(function() {
            clickCount = 0;
            window.location = aboutLink.getAttribute("href");
          }, CLICK_WINDOW_MS);
        });
      })();
    </script>
</body>
</html>
